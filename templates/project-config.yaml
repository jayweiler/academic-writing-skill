# Academic Writing Project Configuration
# Generated by academic-writing skill init
# Edit this file to configure your project.

# --- Project Metadata ---
project_name: ""              # Human-readable name (e.g., "AI Bias in Safety Measures")
author: ""                    # Primary author name
institution: ""               # Institution or program (optional)
working_directory: ""         # Absolute path to the project root folder

# --- Outline ---
# Path to the project outline file (relative to working_directory)
outline_path: "outline.md"

# --- Style Guide ---
# Path to the project style guide (relative to working_directory)
# The style guide captures the author's voice, formatting preferences,
# and conventions. If you don't have one yet, the writing process will
# help you build one as preferences emerge during drafting.
style_guide_path: "style-guide.md"

# --- Compiled Draft ---
# Path to the compiled full draft (relative to working_directory)
compiled_draft_path: "drafts/compiled-draft.md"

# --- Section Drafts ---
# Directory for individual section drafts (relative to working_directory)
drafts_directory: "drafts/"

# --- Section State Files ---
# Directory for per-section state files (relative to working_directory)
# These track references reviewed, drafting decisions, open gaps, and
# current status for each section.
state_directory: "state/"

# --- Process Documentation ---
decision_log_path: "process/decision-log.md"
process_journal_path: "process/process-journal.md"
section_status_path: "section-status.md"

# --- References ---
# Directory for per-reference notes and extracted summaries
references_directory: "references/"

# --- Session Transcripts ---
transcripts_path: "session_transcripts/"

# --- Platform Configuration ---
# Which platform are you using?
#   cowork    — Claude Desktop Cowork mode
#   claude-code — Claude Code CLI
#   manual    — Other (you'll save transcripts yourself)
platform: "manual"

# --- Session Log Access ---
# Controls whether the skill can read raw session logs for
# automatic decision extraction and transcript archival.
session_log_access:
  enabled: false
  # Auto-detected from platform, or specify a custom path pattern.
  # Use {date} as placeholder for YYYY-MM-DD.
  path_pattern: ""
  # Permission state for reading session logs:
  #   prompt  — Ask the user on first session (recommended)
  #   granted — User has already approved access
  #   denied  — User has declined; fall back to manual
  permissions: "prompt"

# --- Decision Extraction Mode ---
# How editorial decisions are captured at session end:
#   auto     — Scan session transcript, present extracted decisions
#              for author confirmation before logging
#   prompted — Ask the author what decisions were made, then log
#   manual   — Remind the author to update the decision log
decision_extraction: "prompted"

# --- Transcript Archival ---
# Automatically copy session transcripts to the project's
# transcripts directory at session end?
auto_archive_transcript: false

# --- Literature Bias Guardrails ---
# These are always active. You can adjust the aggressiveness:
#   strict   — Block progression to drafting if representation
#              audit shows zero non-Western/non-English sources
#   standard — Flag gaps but allow the author to proceed
#   advisory — Mention gaps without blocking
bias_guardrail_level: "standard"

# --- Context Engineering ---
# Maximum percentage of remaining context to consume before
# triggering a state checkpoint save. Lower = more conservative.
context_checkpoint_threshold: 30
